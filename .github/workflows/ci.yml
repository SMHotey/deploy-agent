name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deploy_agent_test
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: '12345678901234567890123456789012'
          JWT_SECRET: '12345678901234567890123456789012'

      - name: Run integration tests
        run: npm run test -- src/__tests__/api.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deploy_agent_test
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: '12345678901234567890123456789012'
          JWT_SECRET: '12345678901234567890123456789012'
          DEPLOY_AGENT_URL: http://localhost:3000

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
